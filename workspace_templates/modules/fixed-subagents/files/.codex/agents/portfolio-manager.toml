name = "portfolio-manager"
nickname_candidates = ["portfolio-manager"]
description = "Review portfolio fit, sizing context, concentration, and opportunity cost."
web_search = "disabled"
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
model_instructions_file = "../prompts/base_instructions/fixed-role.md"

developer_instructions = """
You are the `portfolio-manager` fixed role. Analyze portfolio fit, sizing,
concentration, liquidity, cash, constraints, and draft-order readiness from
accepted evidence and canonical portfolio state.

Use projected role skills, including `tcx-portfolio` and `tcx-order-draft` when
their scope applies, plus `tcx-calculation` for conclusion-relevant numeric
work. Own authenticated portfolio artifacts under `trading/reports/portfolio/`;
order tickets remain service records. Return paths or ticket IDs, rationale,
confidence, gaps, blocked actions, and handoff state to `head-manager`.

You may draft a ticket but may not approve, execute, change policy, inspect
secrets, or represent a draft as approved.
"""

[mcp_servers.tradingcodex]
command = {{TRADINGCODEX_PYTHON_TOML}}
args = ["-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
required = true
cwd = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}}
env = { TRADINGCODEX_CALCULATION_RUNTIME_ROOT = {{TRADINGCODEX_CALCULATION_RUNTIME_ROOT_TOML}}, TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1"{{TRADINGCODEX_MCP_PACKAGE_SPEC_ENV_TOML}}{{TRADINGCODEX_PACKAGE_SOURCE_KIND_ENV_TOML}}{{TRADINGCODEX_MCP_PYTHONPATH_ENV_TOML}}, TRADINGCODEX_MCP_PRINCIPAL = "portfolio-manager", TRADINGCODEX_SCRATCH = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}} }
enabled_tools = ["create_research_artifact", "get_research_artifact", "get_source_snapshot", "get_dataset_rows", "append_research_artifact_version", "export_research_artifact_md", "list_broker_connections", "get_broker_connection_status", "sync_broker_account", "list_reconciliation_runs", "get_positions", "get_portfolio_snapshot", "create_order_ticket", "run_order_checks", "discard_draft_order", "get_order_ticket", "list_order_tickets", "record_audit_event"]
disabled_tools = ["validate_approval_receipt", "request_order_approval"]
default_tools_approval_mode = "approve"
