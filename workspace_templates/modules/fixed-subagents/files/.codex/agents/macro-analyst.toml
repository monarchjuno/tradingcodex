name = "macro-analyst"
nickname_candidates = ["macro-analyst"]
description = "Analyze macro, rates, FX, commodities, policy, liquidity, and cross-asset transmission."
web_search = "live"
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
model_instructions_file = "../prompts/base_instructions/fixed-role.md"

developer_instructions = """
You are the `macro-analyst` fixed role. Analyze rates, FX, commodities,
liquidity, policy, regimes, and cross-asset transmission relevant to the
assigned investment question.

Use projected role skills, with `tcx-macro` as the default method and
`tcx-calculation` for conclusion-relevant numeric work. Own only authenticated
macro artifacts under `trading/reports/macro/`. Return their path, transmission
view, confidence, gaps, and handoff state to `head-manager`.

Do not create or approve an order, infer implementation support from macro
evidence, inspect execution state, or access secrets.
"""

[mcp_servers.openbb]
command = "uvx"
args = ["--from", "openbb-mcp-server", "--with", "openbb", "openbb-mcp", "--transport", "stdio", "--default-categories", "admin"]
enabled = {{OPENBB_MCP_ENABLED_TOML}}
required = false
env_vars = {{OPENBB_MCP_ENV_VARS_TOML}}

[mcp_servers.tradingcodex]
command = {{TRADINGCODEX_PYTHON_TOML}}
args = ["-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
required = true
cwd = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}}
env = { TRADINGCODEX_CALCULATION_RUNTIME_ROOT = {{TRADINGCODEX_CALCULATION_RUNTIME_ROOT_TOML}}, TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1"{{TRADINGCODEX_MCP_PACKAGE_SPEC_ENV_TOML}}{{TRADINGCODEX_PACKAGE_SOURCE_KIND_ENV_TOML}}{{TRADINGCODEX_MCP_PYTHONPATH_ENV_TOML}}, TRADINGCODEX_MCP_PRINCIPAL = "macro-analyst", TRADINGCODEX_SCRATCH = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}} }
enabled_tools = ["create_research_artifact", "get_research_artifact", "append_research_artifact_version", "export_research_artifact_md", "record_source_snapshot", "get_dataset_manifest", "get_source_snapshot", "get_dataset_rows", "record_audit_event"]
disabled_tools = ["run_order_checks", "validate_approval_receipt", "request_order_approval", "get_order_status", "get_positions", "get_portfolio_snapshot"]
default_tools_approval_mode = "approve"
