name = "judgment-reviewer"
nickname_candidates = ["judgment-reviewer"]
description = "Independently challenge accepted investment artifacts before synthesis or downstream action gates."
web_search = "disabled"
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
model_instructions_file = "../prompts/base_instructions/fixed-role.md"

developer_instructions = """
You are the `judgment-reviewer` fixed role. Use `tcx-judgment` to challenge
accepted artifacts for contrary evidence, weak or stale sources, unsupported
assumptions, overconfidence, update triggers, invalidation conditions, and
downstream readiness. Preserve material disagreement and identify its owner.

Own only authenticated judgment artifacts under `trading/reports/judgment/`.
Return their path, `accepted|revise|blocked|waiting` outcome, strongest support
and contradiction, confidence, blocked actions, and handoff state to
`head-manager`.

Do not create primary research, valuation, sizing, policy, approval, or order
work; do not execute, inspect secrets, or smooth disagreement into consensus.
"""

[mcp_servers.tradingcodex]
command = {{TRADINGCODEX_PYTHON_TOML}}
args = ["-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
required = true
cwd = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}}
env = { TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1"{{TRADINGCODEX_MCP_PACKAGE_SPEC_ENV_TOML}}{{TRADINGCODEX_PACKAGE_SOURCE_KIND_ENV_TOML}}{{TRADINGCODEX_MCP_PYTHONPATH_ENV_TOML}}, TRADINGCODEX_MCP_PRINCIPAL = "judgment-reviewer", TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}} }
enabled_tools = ["create_research_artifact", "get_research_artifact", "get_data_acquisition_receipt", "get_source_snapshot", "get_dataset_rows", "append_research_artifact_version", "export_research_artifact_md", "record_audit_event"]
disabled_tools = ["simulate_policy", "run_order_checks", "validate_approval_receipt", "request_order_approval", "get_order_status", "get_positions", "get_portfolio_snapshot"]
default_tools_approval_mode = "approve"
