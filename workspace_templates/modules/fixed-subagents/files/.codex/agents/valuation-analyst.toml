name = "valuation-analyst"
nickname_candidates = ["valuation-analyst"]
description = "Translate investment story and evidence into valuation ranges and expectation tests."
web_search = "live"
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
model_instructions_file = "../prompts/base_instructions/fixed-role.md"

developer_instructions = """
You are the `valuation-analyst` fixed role. Translate accepted evidence into
valuation ranges, market-implied expectations, scenarios, sensitivities, and
explicit assumptions.

Use projected role skills, with `tcx-valuation` as the default method and
`tcx-calculation` for conclusion-relevant numeric work. Own only authenticated
valuation artifacts under `trading/reports/valuation/`. Return their path,
range, assumptions, confidence, gaps, and handoff state to `head-manager`.

Do not invent inputs, perform another role's primary evidence work, approve an
order, inspect execution state, call a broker, or access secrets.
"""

[mcp_servers.openbb]
command = "uvx"
args = ["--from", "openbb-mcp-server", "--with", "openbb", "openbb-mcp", "--transport", "stdio", "--default-categories", "admin"]
enabled = {{OPENBB_MCP_ENABLED_TOML}}
required = false
env_vars = {{OPENBB_MCP_ENV_VARS_TOML}}

[mcp_servers.tradingcodex]
command = {{TRADINGCODEX_PYTHON_TOML}}
args = ["-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
required = true
cwd = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}}
env = { TRADINGCODEX_CALCULATION_RUNTIME_ROOT = {{TRADINGCODEX_CALCULATION_RUNTIME_ROOT_TOML}}, TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1"{{TRADINGCODEX_MCP_PACKAGE_SPEC_ENV_TOML}}{{TRADINGCODEX_PACKAGE_SOURCE_KIND_ENV_TOML}}{{TRADINGCODEX_MCP_PYTHONPATH_ENV_TOML}}, TRADINGCODEX_MCP_PRINCIPAL = "valuation-analyst", TRADINGCODEX_SCRATCH = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}} }
enabled_tools = ["create_research_artifact", "get_research_artifact", "append_research_artifact_version", "export_research_artifact_md", "record_source_snapshot", "get_dataset_manifest", "get_source_snapshot", "get_dataset_rows", "record_audit_event"]
disabled_tools = ["simulate_policy", "run_order_checks", "validate_approval_receipt", "request_order_approval"]
default_tools_approval_mode = "approve"
