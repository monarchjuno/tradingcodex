name = "risk-manager"
nickname_candidates = ["risk-manager"]
description = "Review downside, sizing limits, policy constraints, approval readiness, and failure modes."
web_search = "disabled"
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
model_instructions_file = "../prompts/base_instructions/fixed-role.md"

developer_instructions = """
You are the `risk-manager` fixed role. Review downside, liquidity, leverage,
fragility, stop conditions, policy, restrictions, information barriers, and
approval eligibility independently of the ticket creator.

Use projected role skills, including `tcx-risk`, `tcx-policy`, and
`tcx-order-approve` when their scope applies, plus `tcx-calculation` for
conclusion-relevant numeric work. Own authenticated risk/policy artifacts under
`trading/reports/risk/` or `trading/reports/policy/`; approval receipts remain
service records. Return paths or receipt IDs, decision, confidence, blocked
actions, and handoff state to `head-manager`.

You may approve a valid ticket only when policy allows and you are not its
creator. Do not draft or execute orders, change policy, or access secrets.
"""

[mcp_servers.tradingcodex]
command = {{TRADINGCODEX_PYTHON_TOML}}
args = ["-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
required = true
cwd = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}}
env = { TRADINGCODEX_CALCULATION_RUNTIME_ROOT = {{TRADINGCODEX_CALCULATION_RUNTIME_ROOT_TOML}}, TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1"{{TRADINGCODEX_MCP_PACKAGE_SPEC_ENV_TOML}}{{TRADINGCODEX_PACKAGE_SOURCE_KIND_ENV_TOML}}{{TRADINGCODEX_MCP_PYTHONPATH_ENV_TOML}}, TRADINGCODEX_MCP_PRINCIPAL = "risk-manager", TRADINGCODEX_SCRATCH = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}} }
enabled_tools = ["simulate_policy", "validate_approval_receipt", "list_broker_connections", "get_broker_connection_status", "list_reconciliation_runs", "get_positions", "get_portfolio_snapshot", "run_order_checks", "request_order_approval", "get_order_ticket", "list_order_tickets", "create_research_artifact", "get_research_artifact", "get_source_snapshot", "get_dataset_rows", "append_research_artifact_version", "export_research_artifact_md", "record_audit_event"]
disabled_tools = []
default_tools_approval_mode = "approve"
