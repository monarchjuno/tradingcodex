ownership_contract:
  note: "Role/file access belongs here and in role TOML/MCP allowlists, not in generic skill bodies."
  future_role_change_requires:
    - role_boundaries entry
    - .codex/agents role TOML
    - ROLE_SKILL_MAP or optional skill projection
    - MCP allowlist review
    - doctor and generated-workspace tests

walls:
  research_wall:
    can_write:
      - trading/reports/fundamental/**
      - trading/reports/technical/**
      - trading/reports/news/**
      - trading/reports/macro/**
      - trading/reports/instrument/**
      - trading/reports/valuation/**
      - trading/forecasts/**
    cannot_read:
      - trading/approvals/**
      - trading/orders/approved/**
      - .tradingcodex/secrets/**
      - .tradingcodex/secrets.md

  execution_wall:
    can_read:
      - trading/orders/approved/**
      - trading/approvals/**
    cannot_read:
      - .tradingcodex/secrets/**
      - .tradingcodex/secrets.md
      - trading/reports/fundamental/raw/**

  policy_wall:
    can_read:
      - .tradingcodex/policies/**
      - trading/reports/policy/**
      - trading/audit/**
    cannot_do:
      - mcp.tradingcodex.submit_approved_order

  judgment_review_wall:
    can_read:
      - trading/research/**
      - trading/reports/**
      - trading/forecasts/**
    can_write:
      - trading/reports/judgment/**
    cannot_read:
      - trading/approvals/**
      - trading/orders/**
      - trading/audit/**
      - .tradingcodex/policies/**
      - .tradingcodex/secrets.md
    cannot_do:
      - policy.write
      - approval.request
      - order.write
      - mcp.tradingcodex.submit_approved_order

  secret_wall:
    owner: tradingcodex-mcp-process
    workspace_secret_storage_allowed: false

