[mcp_servers.tradingcodex]
command = {{TRADINGCODEX_PYTHON_TOML}}
args = ["-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
required = true
cwd = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}}
env = { TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1"{{TRADINGCODEX_MCP_PACKAGE_SPEC_ENV_TOML}}{{TRADINGCODEX_PACKAGE_SOURCE_KIND_ENV_TOML}}{{TRADINGCODEX_MCP_PYTHONPATH_ENV_TOML}}, TRADINGCODEX_MCP_PRINCIPAL = "head-manager", TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = {{TRADINGCODEX_WORKSPACE_ROOT_TOML}} }
enabled_tools = [
  "get_tradingcodex_status",
  "get_update_status",
  "manage_strategy",
  "manage_investment_brain",
  "begin_analysis_run",
  "simulate_policy",
  "get_order_status",
  "list_broker_connections",
  "get_broker_connection_status",
  "list_broker_adapter_providers",
  "render_broker_connector_scaffold",
  "register_broker_connector",
  "validate_broker_connector_build",
  "get_broker_capability_profile",
  "get_broker_instrument_constraints",
  "preview_order_translation",
  "get_connector_build_status",
  "list_reconciliation_runs",
  "get_order_ticket",
  "list_order_tickets",
  "use_order_turn_grant",
  "record_broker_mapping_review",
  "get_positions",
  "get_portfolio_snapshot",
  "list_workflow_artifacts",
  "create_research_artifact",
  "get_research_artifact",
  "list_research_artifacts",
  "search_research_artifacts",
  "append_research_artifact_version",
  "export_research_artifact_md",
  "record_source_snapshot",
  "list_external_mcp_connections",
  "record_audit_event"
]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20
tool_timeout_sec = 30

[shell_environment_policy]
inherit = "core"
set = { TRADINGCODEX_SCRATCH = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TMPDIR = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TEMP = {{TRADINGCODEX_SCRATCH_PATH_TOML}}, TMP = {{TRADINGCODEX_SCRATCH_PATH_TOML}} }
ignore_default_excludes = false
include_only = [
  "PATH",
  "HOME",
  "TMPDIR",
  "TEMP",
  "TMP",
  "LANG",
  "LC_*",
  "TERM",
  "SYSTEMROOT",
  "WINDIR",
  "PATHEXT",
  "COMSPEC",
  "TRADINGCODEX_SCRATCH"
]
exclude = [
  "*API_KEY*",
  "*SECRET*",
  "*TOKEN*",
  "BROKER_*",
  "BROKER_API_KEY",
  "BROKER_API_SECRET",
  "TRADING_API_KEY",
  "TRADING_API_SECRET"
]
