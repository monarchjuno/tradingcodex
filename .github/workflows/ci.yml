name: CI (no deploy)
run-name: CI checks only (no deploy) - ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Test and build React workbench
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test, and build frontend
        run: |
          npm ci --prefix frontend
          npm test --prefix frontend
          npm run build --prefix frontend

      - name: Verify committed frontend build
        run: git diff --exit-code -- tradingcodex_service/static/tradingcodex_web

  invariant-gate:
    name: Safety and financial invariant gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with development extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" uv

      - name: Run release-blocking negative and concurrency tests
        run: >-
          pytest
          tests/test_security_invariants.py
          tests/test_mcp_broker_release_health.py
          tests/test_runtime_profile.py
          tests/test_broker_center_prd.py

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    needs: invariant-gate
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with development extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" uv

      - name: Run tests
        run: pytest

      - name: Run Django checks
        run: python manage.py check

      - name: Check migrations are current
        run: python manage.py makemigrations --check --dry-run

      - name: Compile Python sources
        run: python -m compileall tradingcodex_cli tradingcodex_service apps tests

  package-smoke:
    name: Build and smoke-test clean wheel
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine uv
          python -m build
          python -m twine check dist/*

      - name: Install and smoke-test only the built wheel
        run: python tests/platform_wheel_smoke.py --wheel-dir dist

      - name: Upload clean wheel for native platform smoke
        uses: actions/upload-artifact@v7
        with:
          name: tradingcodex-wheel
          path: dist/*.whl
          if-no-files-found: error

  native-platform-wheel-smoke:
    name: Native wheel smoke (${{ matrix.os }})
    needs: package-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Download clean wheel
        uses: actions/download-artifact@v8
        with:
          name: tradingcodex-wheel
          path: dist

      - name: Install durable runtime provisioner
        run: python -m pip install uv

      - name: Run native launcher, config, process, and service smoke
        run: python tests/platform_wheel_smoke.py --wheel-dir dist
